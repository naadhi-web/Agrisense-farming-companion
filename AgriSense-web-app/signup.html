<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AgriSense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- Bootstrap (optional but keep for layout) -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    /* Keep your existing styles here – they will work unchanged */
    body {
      background: #e5f3e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: white;
      border-radius: 36px;
      padding: 2.5rem;
      box-shadow: 0 25px 45px -20px #204d2e;
      border: 1px solid #d9eed9;
    }
    .login-card h2 {
      color: #1d4429;
      font-weight: 700;
    }
    .btn-primary {
      background: #1c6133;
      border: none;
      border-radius: 40px;
      padding: 0.8rem;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #247a3d;
    }
    .text-link {
      color: #1c6133;
      font-weight: 600;
    }
    .text-link:hover {
      color: #247a3d;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="login-card">
          <h2 class="text-center mb-4">Create Account</h2>

         

          <form method="post" action="{{ url_for('signup') }}">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
              <label for="confirm_password">Confirm Password</label>
              <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
          </form>
          <div class="text-center mt-3">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optional, for alert dismissal) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
